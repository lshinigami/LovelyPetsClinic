services:
  postgres:
    image: postgres:16-alpine
    container_name: lovelypets-db
    networks:
      - demo-network
    environment:
      POSTGRES_DB: lovelypets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lovelypets"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks:
      - demo-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "srvr,ruok"
    healthcheck:
      test: [ "CMD", "bash", "-c", "echo ruok | timeout 2 bash -c 'cat > /dev/tcp/localhost/2181' && echo imok" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.7.8
    container_name: kafka
    networks:
      - demo-network
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - demo-network
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"                          # kafka-ui слушает 8080 внутри, не 8090
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  mobile-api:
    build:
      context: .
      dockerfile: mobile-api/Dockerfile
    container_name: lovelypets-mobile-api
    networks:
      - demo-network
    ports:
      - "8080:8080"
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lovelypets
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: secret
      # Flyway
      SPRING_FLYWAY_ENABLED: "true"
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # JWT
      JWT_SECRET: "your-super-secret-key-that-is-at-least-32-chars!!"
      JWT_ACCESS_EXPIRATION_MS: "900000"
      JWT_REFRESH_EXPIRATION_MS: "604800000"
      # OTP
      AUTH_OTP_EXPIRATION_MINUTES: "10"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

