spring:
  application:
    name: mobile-api

  datasource:
    url: jdbc:postgresql://localhost:5432/mobile-api
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: secret

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
