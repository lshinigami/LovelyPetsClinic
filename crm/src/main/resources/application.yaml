spring:
  application:
    name: crm

  datasource:
    url: jdbc:postgresql://localhost:5432/mobile-api
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: secret

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

jwt:
  # Минимум 256 бит (32 символа) для HMAC-SHA256
  secret: ${JWT_SECRET:change-me-in-production-use-env-var-please!!}
  access-expiration-ms: 900000      # 15 минут
  refresh-expiration-ms: 604800000  # 7 дней